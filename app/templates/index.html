{% extends "base.html" %}
{% block title %}Biological Age Form{% endblock %}
{% block content %}
<section class="disclaimer">
  <h2>Disclaimer</h2>
  <p>{{ disclaimer }}</p>
</section>
<form method="post" action="/calculate" class="card-form">
  <fieldset>
    <legend>Demographics</legend>
    <label>Chronological Age (years) <span class="req">*</span><input type="number" name="chronological_age_years" required></label>
    <label>Sex <span class="req">*</span>
      <select name="sex" required>
        <option value="male">Male</option><option value="female">Female</option>
      </select>
    </label>
  </fieldset>

  <fieldset>
    <legend>Cardiovascular</legend>
    <label>Systolic BP (mmHg) <span class="req">*</span><input type="number" name="sbp_mmHg" required></label>
    <label>Diastolic BP (mmHg) <span class="req">*</span><input type="number" name="dbp_mmHg" required></label>
    <label>PWV (m/s, optional)<input type="number" step="0.1" name="pwv_m_per_s"></label>
  </fieldset>

  <fieldset>
    <legend>Metabolic</legend>
    <label>Height (cm, optional if BMI provided)<input type="number" step="0.1" name="height_cm"></label>
    <label>Weight (kg, optional if BMI provided)<input type="number" step="0.1" name="weight_kg"></label>
    <label>BMI (optional if height/weight provided)<input type="number" step="0.1" name="bmi"></label>
    <label>Waist (cm) <span class="req">*</span><input type="number" step="0.1" name="waist_cm" required></label>
  </fieldset>

  <fieldset>
    <legend>Lifestyle</legend>
    <label>Smoking <span class="req">*</span><select name="smoking_status" required><option value="never">Never</option><option value="former">Former</option><option value="current">Current</option></select></label>
    <label>Alcohol <span class="req">*</span><select name="alcohol_use" required><option value="none">None</option><option value="light">Light</option><option value="moderate">Moderate</option><option value="heavy">Heavy</option></select></label>
    <label>Drug use <span class="req">*</span><select name="drug_use" required><option value="none">None</option><option value="occasional">Occasional</option><option value="regular">Regular</option></select></label>
    <label>Caffeine <span class="req">*</span><select name="caffeine_use" required><option value="none">None</option><option value="low">Low</option><option value="moderate">Moderate</option><option value="high">High</option></select></label>
  </fieldset>

  <fieldset>
    <legend>Sleep</legend>
    <label>Sleep hours/night <span class="req">*</span><input type="number" step="0.1" name="sleep_hours" required></label>
    <label>Sleep quality <span class="req">*</span><select name="sleep_quality" required><option value="poor">Poor</option><option value="fair">Fair</option><option value="good">Good</option><option value="excellent">Excellent</option></select></label>
    <label>Sleep consistency <span class="req">*</span><select name="sleep_consistency" required><option value="irregular">Irregular</option><option value="somewhat_regular">Somewhat regular</option><option value="regular">Regular</option></select></label>
  </fieldset>
  <button type="submit">Calculate Biological Age</button>
</form>
{% endblock %}
