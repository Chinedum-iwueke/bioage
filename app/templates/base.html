<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Biological Age{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body>
  <main class="container">
    <header class="site-header">
      <div>
        <h1><a class="site-title-link" href="/">Biological Age Calculator</a></h1>
        <p class="subtitle">Educational estimate only.</p>
      </div>
      <nav class="header-nav" aria-label="Primary">
        <a href="/?reset=1">New Calculation</a>
      </nav>
    </header>
    {% block content %}{% endblock %}
  </main>
  <script src="{{ url_for('static', path='/js/form.js') }}"></script>
</body>
</html>
