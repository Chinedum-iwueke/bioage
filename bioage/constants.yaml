version: 1
units:
  blood_pressure: mmHg
  waist_circumference: cm
  bmi: kg/m2
  physical_activity: minutes_per_week
  sleep_duration: hours_per_night

# Bin scores are relative risk points; higher points indicate higher expected age acceleration.
thresholds:
  blood_pressure:
    systolic:
      normal:
        range: "<120"
        score: 0
      elevated:
        range: "120-129"
        score: 8
      stage_1_hypertension:
        range: "130-139"
        score: 18
      stage_2_hypertension:
        range: "140-179"
        score: 32
      hypertensive_crisis:
        range: ">=180"
        score: 45
    diastolic:
      normal:
        range: "<80"
        score: 0
      stage_1_hypertension:
        range: "80-89"
        score: 16
      stage_2_hypertension:
        range: "90-119"
        score: 30
      hypertensive_crisis:
        range: ">=120"
        score: 45

  pwv:
    optimal:
      range: "<7.0"
      score: 0
    mildly_elevated:
      range: "7.0-8.9"
      score: 12
    elevated:
      range: "9.0-10.9"
      score: 24
    high:
      range: ">=11.0"
      score: 38

  bmi:
    underweight:
      range: "<18.5"
      score: 10
    normal:
      range: "18.5-24.9"
      score: 0
    overweight:
      range: "25.0-29.9"
      score: 10
    obesity_class_1:
      range: "30.0-34.9"
      score: 20
    obesity_class_2:
      range: "35.0-39.9"
      score: 30
    obesity_class_3:
      range: ">=40.0"
      score: 40

  waist_circumference:
    male:
      low_risk:
        range: "<90"
        score: 0
      increased_risk:
        range: "90-99"
        score: 12
      high_risk:
        range: "100-109"
        score: 22
      very_high_risk:
        range: ">=110"
        score: 34
    female:
      low_risk:
        range: "<80"
        score: 0
      increased_risk:
        range: "80-87"
        score: 12
      high_risk:
        range: "88-94"
        score: 24
      very_high_risk:
        range: ">=95"
        score: 38

  smoking:
    never:
      score: 0
    former:
      score: 10
    current:
      score: 38

  sleep_duration:
    optimal:
      range: "7-8"
      score: 0
    short_or_long_mild:
      range: "6 or 9"
      score: 8
    short_or_long_moderate:
      range: "5 or 10"
      score: 16
    very_short_or_very_long:
      range: "<5 or >10"
      score: 26

  sleep_quality:
    poor:
      score: 28
    fair:
      score: 15
    good:
      score: 6
    excellent:
      score: 0

  sleep_consistency:
    irregular:
      score: 24
    somewhat_regular:
      score: 10
    regular:
      score: 0

  alcohol:
    none:
      score: 0
    light:
      score: 4
    moderate:
      score: 10
    heavy:
      score: 20

  drug_use:
    none:
      score: 0
    occasional:
      score: 12
    regular:
      score: 28

  caffeine_use:
    none:
      score: 2
    low:
      score: 0
    moderate:
      score: 6
    high:
      score: 14

weights:
  systems:
    cardiovascular: 0.36
    metabolic: 0.30
    lifestyle: 0.24
    recovery: 0.10

  # Relative weights within each system (sum to 1.0 per system).
  cardiovascular_components:
    systolic_bp: 0.52
    diastolic_bp: 0.33
    smoking: 0.15

  metabolic_components:
    bmi: 0.45
    waist_circumference: 0.55

  lifestyle_components:
    smoking: 0.45
    alcohol: 0.25
    drug_use: 0.20
    caffeine_use: 0.10

  sleep_components:
    duration: 0.50
    quality: 0.30
    consistency: 0.20

age_delta:
  pivot_risk: 50
  pivot_delta_years: 0
  slope_years_per_risk_point: 0.25
  min_years: -8
  max_years: 15
  interpretation:
    low_risk_bonus_threshold: 20
    high_risk_threshold: 70


model:
  version: "1.0.0"
  subscores:
    aggregation_default: mean
    systems:
      cardio:
        components: bp,pwv
        aggregation: mean
      metabolic:
        components: bmi,waist
        aggregation: mean
      lifestyle:
        components: lifestyle
        aggregation: mean
      recovery:
        components: sleep
        aggregation: mean
  total_risk:
    system_weights:
      cardio: 0.36
      metabolic: 0.30
      lifestyle: 0.24
      recovery: 0.10
  age_delta:
    mapping: linear
    linear:
      pivot_risk: 50
      pivot_delta_years: 0
      slope_years_per_risk_point: 0.25
    caps:
      min_years: -8
      max_years: 15

copy:
  disclaimer_short: "Educational guidance only. These results are not a diagnosis or treatment plan. Discuss personal decisions with a qualified healthcare professional."
  domain_summaries:
    cardio: "Cardiovascular markers reflect blood pressure and arterial stiffness patterns linked with vascular workload over time."
    metabolic: "Metabolic markers reflect body composition patterns associated with long-term cardiometabolic strain."
    lifestyle: "Lifestyle markers summarize smoking and substance-use patterns that can influence long-term aging trajectories."
    recovery: "Recovery markers summarize sleep duration and regularity patterns tied to daily restoration."
  counterfactual_labels:
    bp: "If blood pressure moved into the normal range"
    waist: "If waist circumference moved to a healthier range"
    smoking: "If smoking status improved"
    sleep: "If sleep duration and consistency moved into an optimal range"

recommendations:
  bp:
    normal:
      tips: ["Maintain current blood-pressure-supportive habits with regular monitoring."]
    elevated:
      tips: ["Track home blood pressure trends weekly.", "Prioritize sodium awareness, regular activity, and stress-management routines."]
    stage_1_hypertension:
      tips: ["Create a structured plan to lower blood pressure through diet, movement, and sleep consistency.", "Review elevated readings with a healthcare professional."]
    stage_2_hypertension:
      tips: ["Prioritize blood pressure improvement with prompt professional follow-up.", "Use daily routines for nutrition quality, activity, and medication adherence if prescribed."]
    hypertensive_crisis:
      tips: ["Very high blood pressure is associated with higher risk; repeat the measurement and discuss next steps with a qualified professional.", "This report is educational and should be used alongside professional guidance."]
  waist:
    low_risk:
      tips: ["Maintain current waist-management habits through sustainable nutrition and activity."]
    increased_risk:
      tips: ["Aim for gradual waist reduction using portion awareness and consistent weekly exercise."]
    high_risk:
      tips: ["Prioritize waist reduction with structured nutrition planning and progressive activity targets.", "Review your plan with a healthcare professional if progress stalls."]
    very_high_risk:
      tips: ["Set a staged waist-reduction goal with professional support.", "Focus on sustainable calorie balance, resistance training, and sleep quality."]
  bmi:
    underweight:
      tips: ["Support healthy weight restoration with nutrient-dense meals and strength-focused training."]
    normal:
      tips: ["Maintain current body-weight habits with balanced nutrition and activity."]
    overweight:
      tips: ["Target gradual weight reduction through consistent nutrition and movement routines."]
    obesity_class_1:
      tips: ["Use a structured weight-management plan with measurable weekly behaviors."]
    obesity_class_2:
      tips: ["Prioritize supervised weight-management support and sustainable routine changes."]
    obesity_class_3:
      tips: ["Discuss comprehensive weight-management options with a healthcare professional."]
  smoking:
    never:
      tips: ["Maintain smoke-free habits."]
    former:
      tips: ["Continue relapse-prevention routines and smoke-free environments."]
    current:
      tips: ["Quitting smoking is one of the highest-impact actions in this model.", "Use evidence-based cessation support with a healthcare professional."]
  alcohol:
    none:
      tips: ["Maintain low-risk alcohol habits."]
    light:
      tips: ["Maintain moderation and alcohol-free days each week."]
    moderate:
      tips: ["Consider reducing alcohol frequency or quantity to lower modeled risk."]
    heavy:
      tips: ["Reduce alcohol intake with structured support and professional guidance when needed."]
  drug_use:
    none:
      tips: ["Maintain substance-free habits."]
    occasional:
      tips: ["Reducing recreational drug use can improve modeled lifestyle risk."]
    regular:
      tips: ["Prioritize reducing drug use with professional support resources."]
  caffeine_use:
    none:
      tips: ["Current caffeine pattern is acceptable in this model."]
    low:
      tips: ["Current caffeine pattern is acceptable in this model."]
    moderate:
      tips: ["Keep caffeine timing earlier in the day to support sleep quality."]
    high:
      tips: ["Reduce high caffeine exposure, especially late-day intake."]
  sleep_duration:
    optimal:
      tips: ["Maintain your current sleep-duration routine."]
    short_or_long_mild:
      tips: ["Adjust schedule toward a consistent 7-8 hour sleep window."]
    short_or_long_moderate:
      tips: ["Prioritize schedule changes that move sleep duration toward 7-8 hours nightly."]
    very_short_or_very_long:
      tips: ["Address extreme sleep duration patterns with a structured recovery routine and professional input if persistent."]
  sleep_quality:
    poor:
      tips: ["Improve sleep environment and pre-sleep routine to support better quality."]
    fair:
      tips: ["Strengthen wind-down habits and bedroom conditions to improve sleep quality."]
    good:
      tips: ["Maintain your current sleep-quality routine."]
    excellent:
      tips: ["Maintain your current sleep-quality routine."]
  sleep_consistency:
    irregular:
      tips: ["Set a consistent sleep and wake schedule across weekdays and weekends."]
    somewhat_regular:
      tips: ["Narrow night-to-night timing variation to improve recovery consistency."]
    regular:
      tips: ["Maintain your regular sleep schedule."]

counterfactual_targets:
  bp:
    target_category: normal
    representative_sbp: 116
    representative_dbp: 74
  waist:
    target_category: low_risk
    representative_cm_by_sex:
      male: 88
      female: 78
  smoking:
    transitions:
      current: former
      former: never
  sleep:
    target_duration_category: optimal
    representative_hours: 7.5
    target_quality: good
    target_consistency: regular
